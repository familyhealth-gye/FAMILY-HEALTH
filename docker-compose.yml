version: '3.8'

services:
  backend:
    build: .
    ports:
      - "10000:10000"
    environment:
      - MONGO_URL=mongodb://mongodb:27017/family_health
      - PORT=10000
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
